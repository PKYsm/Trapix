name: Android Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6 directly
        run: |
          # Download and install Gradle directly - no wrapper jar needed
          GRADLE_VERSION="8.6"
          GRADLE_ZIP="/tmp/gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_INSTALL_DIR="$HOME/gradle-${GRADLE_VERSION}"

          echo "Downloading Gradle ${GRADLE_VERSION}..."
          curl -L -o "$GRADLE_ZIP" \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          
          echo "Extracting..."
          unzip -q "$GRADLE_ZIP" -d "$HOME"
          mv "$HOME/gradle-${GRADLE_VERSION}" "$GRADLE_INSTALL_DIR" 2>/dev/null || true
          
          GRADLE_BIN=$(find "$HOME" -name "gradle" -path "*/bin/gradle" | head -1)
          echo "Gradle found at: $GRADLE_BIN"
          echo "GRADLE_HOME=$(dirname $(dirname $GRADLE_BIN))" >> $GITHUB_ENV
          echo "$(dirname $GRADLE_BIN)" >> $GITHUB_PATH

          # Also put the wrapper jar from this Gradle install into the project
          WRAPPER_JAR=$(find "$HOME" -name "gradle-wrapper.jar" | head -1)
          if [ -n "$WRAPPER_JAR" ]; then
            echo "Found wrapper jar at $WRAPPER_JAR ($(wc -c < "$WRAPPER_JAR") bytes)"
            mkdir -p gradle/wrapper
            cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
          fi
          
          chmod +x gradlew
          gradle --version

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get build tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release-apk
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK found: $APK_PATH"
          cp "$APK_PATH" "release-apk/Trapix-${{ steps.tag.outputs.tag }}.apk"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trapix-APK-${{ steps.tag.outputs.tag }}
          path: release-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Trapix ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🔐 Trapix — Intruder Catcher

            ### Install Karo:
            1. Neeche `Trapix-*.apk` download karo
            2. Phone mein "Unknown sources" enable karo
            3. APK install karo aur app open karo!

            **Commit:** `${{ github.sha }}`
          files: release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

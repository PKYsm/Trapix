name: Android Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6 directly
        run: |
          GRADLE_VERSION="8.6"
          GRADLE_ZIP="/tmp/gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_INSTALL_DIR="$HOME/gradle-${GRADLE_VERSION}"

          echo "Downloading Gradle ${GRADLE_VERSION}..."
          curl -L -o "$GRADLE_ZIP" \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"

          echo "Extracting..."
          unzip -q "$GRADLE_ZIP" -d "$HOME"
          mv "$HOME/gradle-${GRADLE_VERSION}" "$GRADLE_INSTALL_DIR" 2>/dev/null || true

          GRADLE_BIN=$(find "$HOME" -name "gradle" -path "*/bin/gradle" | head -1)
          echo "Gradle found at: $GRADLE_BIN"
          echo "GRADLE_HOME=$(dirname $(dirname $GRADLE_BIN))" >> $GITHUB_ENV
          echo "$(dirname $GRADLE_BIN)" >> $GITHUB_PATH

          WRAPPER_JAR=$(find "$HOME" -name "gradle-wrapper.jar" | head -1)
          if [ -n "$WRAPPER_JAR" ]; then
            echo "Found wrapper jar at $WRAPPER_JAR"
            mkdir -p gradle/wrapper
            cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
          fi

          chmod +x gradlew
          gradle --version

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Setup Keystore for Signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "Keystore decoded ($(wc -c < keystore.jks) bytes)"

      - name: Build & Sign Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Get build tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Collect APKs
        run: |
          mkdir -p release-apk
          # Debug APK
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "release-apk/Trapix-debug-${{ steps.tag.outputs.tag }}.apk"
            echo "Debug APK: $DEBUG_APK"
          fi
          # Signed Release APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "release-apk/Trapix-release-signed-${{ steps.tag.outputs.tag }}.apk"
            echo "Release APK: $RELEASE_APK"
          fi
          echo "APKs collected:"
          ls -lh release-apk/

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Trapix-APKs-${{ steps.tag.outputs.tag }}
          path: release-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Trapix ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🔐 Trapix — Intruder Catcher

            ### What's New:
            - ✅ Pattern lock fixed
            - ✅ Wrong attempt threshold working correctly
            - ✅ App minimize → auto lock feature
            - ✅ Gallery search + filter (camera, date)
            - ✅ Permission status in settings
            - ✅ Signed release APK

            ### Install Karo:
            1. **`Trapix-release-signed-*.apk`** — Signed (recommended, update without uninstall)
            2. **`Trapix-debug-*.apk`** — Debug build

            **Commit:** `${{ github.sha }}`
          files: release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
